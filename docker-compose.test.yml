services:
  test-db:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: test_password
      MYSQL_DATABASE: schoolpay_test
      MYSQL_USER: schoolpay_test
      MYSQL_PASSWORD: schoolpay_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
