basePath: /api/v1
definitions:
  github_com_ahmadzakyarifin_schoolpay_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  github_com_ahmadzakyarifin_schoolpay_internal_dto.LoginResponse:
    properties:
      access_token:
        type: string
      user:
        $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_internal_dto.UserInfo'
    type: object
  github_com_ahmadzakyarifin_schoolpay_internal_dto.UserInfo:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response:
    properties:
      data: {}
      errors:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      message:
        type: string
      status:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: ahmadzakyarifin@gmail.com
    name: API Support
  description: Backend API for SchoolPay
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: SchoolPay API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return an access token and refresh token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_internal_dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response'
      summary: User Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the refresh token and clear cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response'
      summary: User Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a refresh token from cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_internal_dto.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ahmadzakyarifin_schoolpay_pkg_utils.Response'
      summary: Refresh Access Token
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
